<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuckinn Proper | Platinum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="tuckinn()" x-cloak>
    <div id="app">
        <!-- HEADER -->
        <header class="logo-header">
            <div class="header-shell">
                <button class="header-action" @click="isDrawerOpen = true" type="button" aria-label="Open menu"><span class="material-icons text-danger fs-3">menu</span></button>
                <img src="logo.jpg" alt="TUCKINN" class="header-logo" @click="view = 'home'">
                <button class="vip-badge" @click="view = 'account'" type="button" aria-label="Open account">
                    <span class="material-icons text-danger fs-3">account_circle</span>
                </button>
            </div>
            <div x-show="isTableLocked" class="table-indicator">
                <span class="material-icons text-info" style="font-size:0.9rem;">table_restaurant</span>
                <span class="text-info fw-bold" x-text="'Table ' + tableNumber"></span>
            </div>
        </header>

        <!-- SIDE DRAWER -->
        <div class="drawer-overlay" x-show="isDrawerOpen" @click="isDrawerOpen = false" x-transition.opacity style="display: none;"></div>
        <div class="side-drawer" :class="{'open': isDrawerOpen}">
            <div class="drawer-header">
                <h3>Platinum Menu</h3>
                <span class="material-icons text-danger fs-3" @click="isDrawerOpen = false" style="cursor:pointer;">close</span>
            </div>
            <div class="drawer-links mt-2">
                <template x-for="(items, category) in fullMenu" :key="category">
                    <div class="drawer-item" @click="openCategory(category)">
                        <div class="d-flex align-items-center gap-3">
                            <span class="material-icons text-danger drawer-icon" x-text="getCategoryIcon(category)"></span>
                            <span class="fw-bold text-white fs-6" x-text="category"></span>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <span class="drawer-count" x-text="items.length"></span>
                            <span class="material-icons text-danger">chevron_right</span>
                        </div>
                    </div>
                </template>
                <div class="drawer-item mt-4 border-top border-bottom border-danger" style="background: rgba(255,59,59,0.05);" @click="startBuilder('sandwich'); isDrawerOpen = false">
                    <span class="fw-bold text-danger fs-5">Build Proper Sandwich</span>
                    <span class="material-icons text-danger">lunch_dining</span>
                </div>
            </div>
        </div>

        <main class="flex-grow-1" style="padding-bottom: 80px;">
            <!-- HOME VIEW -->
            <template x-if="view === 'home'">
                <div class="view-enter">

                    <!-- Loading Skeleton -->
                    <template x-if="isLoading">
                        <div>
                            <div class="hero-wrapper">
                                <div class="skeleton-hero">
                                    <div class="skeleton skeleton-logo"></div>
                                    <div class="skeleton skeleton-title"></div>
                                    <div class="skeleton skeleton-tagline"></div>
                                    <div class="skeleton-features mt-4 mb-4">
                                        <div class="skeleton skeleton-feature"></div>
                                        <div class="skeleton skeleton-feature"></div>
                                        <div class="skeleton skeleton-feature"></div>
                                    </div>
                                    <div class="skeleton skeleton-btn"></div>
                                </div>
                            </div>
                            <div class="p-4">
                                <div class="skeleton" style="height:24px;width:140px;margin-bottom:16px;border-radius:6px;"></div>
                                <div class="skeleton" style="height:80px;border-radius:16px;margin-bottom:12px;"></div>
                                <div class="skeleton" style="height:80px;border-radius:16px;margin-bottom:12px;"></div>
                            </div>
                        </div>
                    </template>

                    <!-- Menu Load Error -->
                    <template x-if="!isLoading && menuError">
                        <div class="text-center p-5">
                            <span class="material-icons text-danger" style="font-size:3rem;">error_outline</span>
                            <p class="mt-3 text-white fw-bold">Could not load menu.</p>
                            <button class="btn btn-outline-danger mt-2" @click="retryMenuLoad()">Retry</button>
                        </div>
                    </template>

                    <!-- Actual Home Content -->
                    <template x-if="!isLoading && !menuError">
                        <div>
                            <!-- HERO SECTION -->
                            <div class="hero-wrapper">
                                <div class="hero-bg-animation">
                                    <div class="hero-gradient"></div>
                                    <div class="hero-particles">
                                        <span></span><span></span><span></span><span></span><span></span>
                                    </div>
                                </div>
                                <div class="hero-shell">
                                    <div class="hero-copy">
                                        <p class="hero-kicker">Tuckinn Proper</p>
                                        <h1 class="hero-title text-danger fw-bolder">Fast lunch ordering, built properly.</h1>
                                        <p class="hero-lead">A cleaner way to order for dine-in tables, collection runs, and signature sandwich builds without slowing the queue down.</p>
                                        <div class="hero-cta-group">
                                            <button class="btn btn-danger btn-hero px-5 py-3 fw-bold text-uppercase shadow-lg" @click="startBuilder('sandwich')">
                                                <span class="material-icons me-2" style="font-size:1.2rem; vertical-align: middle;">lunch_dining</span>
                                                Start Sandwich
                                            </button>
                                            <button class="btn btn-hero-secondary px-4 py-3 fw-bold text-uppercase" @click="isDrawerOpen = true" type="button">
                                                <span class="material-icons me-2" style="font-size:1.2rem; vertical-align: middle;">restaurant_menu</span>
                                                Full Menu
                                            </button>
                                        </div>
                                        <div class="hero-meta-row">
                                            <div class="hero-meta-card">
                                                <span class="material-icons">bolt</span>
                                                <div>
                                                    <strong>Quick flow</strong>
                                                    <span>Made for lunch-rush ordering</span>
                                                </div>
                                            </div>
                                            <div class="hero-meta-card">
                                                <span class="material-icons">table_restaurant</span>
                                                <div>
                                                    <strong x-text="isTableLocked ? 'Table ' + tableNumber : 'Dine-in ready'"></strong>
                                                    <span x-text="isTableLocked ? 'Order stays tied to your table' : 'QR-friendly service flow'"></span>
                                                </div>
                                            </div>
                                            <div class="hero-meta-card">
                                                <span class="material-icons">shopping_bag</span>
                                                <div>
                                                    <strong x-text="cart.length ? cart.length + ' item basket' : 'Basket empty'"></strong>
                                                    <span x-text="cart.length ? formatMoney(cartTotal) : 'Start with a quick build'"></span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="hero-brand-panel">
                                        <div class="hero-logo-badge hero-logo-badge-large">
                                            <img src="logo.jpg" alt="Tuckinn Proper logo" class="hero-brand-logo">
                                        </div>
                                        <div class="hero-brand-details">
                                            <span class="hero-brand-label">Neighbourhood sandwich kitchen</span>
                                            <strong>Built for fast, confident ordering.</strong>
                                            <p>Choose a signature item, browse the menu, or build your sandwich from scratch in a guided flow.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- QUICK ACTIONS -->
                            <div class="home-section p-4">
                                <div class="section-heading">
                                    <div>
                                        <p class="section-kicker">Start here</p>
                                        <h4 class="mb-1 text-white fw-bold mt-2">Choose Your Order Path</h4>
                                    </div>
                                    <span class="section-aside">Fastest routes into the menu</span>
                                </div>
                                <div class="builder-grid">
                                    <div class="builder-card-large builder-card-primary" @click="startBuilder('sandwich')">
                                        <div class="builder-content w-100">
                                            <div>
                                                <span class="builder-kicker">Custom build</span>
                                                <h3 class="text-white fw-bold m-0">Build Your Sandwich</h3>
                                                <p class="text-white small m-0 mt-2">Pick bread, protein, veg, cheese, and sauce in a guided flow.</p>
                                            </div>
                                            <div class="builder-card-footer">
                                                <span>Start from the signature builder</span>
                                                <span class="material-icons text-danger">arrow_forward</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="builder-card-large builder-card-secondary" @click="openCategory('Meal Deals')">
                                        <div class="builder-content w-100">
                                            <div>
                                                <span class="builder-kicker">Popular bundles</span>
                                                <h3 class="text-white fw-bold m-0">Meal Deals</h3>
                                                <p class="text-white small m-0 mt-2">Best-value combinations for solo lunches and quick add-ons.</p>
                                            </div>
                                            <div class="builder-card-footer">
                                                <span>Open the fastest bundle menu</span>
                                                <span class="material-icons text-warning">arrow_forward</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="home-section p-4 pt-0" x-show="homeCategories().length">
                                <div class="section-heading">
                                    <div>
                                        <p class="section-kicker">Menu overview</p>
                                        <h4 class="mb-1 text-white fw-bold">Featured Categories</h4>
                                    </div>
                                    <button class="section-link" @click="isDrawerOpen = true" type="button">Open all</button>
                                </div>
                                <div class="category-grid">
                                    <template x-for="category in homeCategories()" :key="category">
                                        <button class="category-spotlight" type="button" @click="openCategory(category)">
                                            <div class="category-spotlight-top">
                                                <span class="material-icons text-danger" x-text="getCategoryIcon(category)"></span>
                                                <span class="category-spotlight-count" x-text="(fullMenu[category] || []).length + ' items'"></span>
                                            </div>
                                            <h5 x-text="category"></h5>
                                            <p x-text="categorySummary(category)"></p>
                                        </button>
                                    </template>
                                </div>
                            </div>

                            <div class="home-section p-4 pt-0" x-show="homeHighlights().length">
                                <div class="section-heading">
                                    <div>
                                        <p class="section-kicker">Staff picks</p>
                                        <h4 class="mb-1 text-white fw-bold">Signature Picks</h4>
                                    </div>
                                </div>
                                <div class="signature-list">
                                    <template x-for="item in homeHighlights()" :key="item.category + item.name">
                                        <div class="signature-card">
                                            <div class="signature-copy">
                                                <span class="signature-category" x-text="item.category"></span>
                                                <h5 x-text="item.name"></h5>
                                                <p x-text="item.desc"></p>
                                            </div>
                                            <div class="signature-action">
                                                <strong x-text="formatMoney(item.price)"></strong>
                                                <button class="signature-btn" type="button" @click="addToCart({ name: item.name, price: item.price, desc: item.desc })">Add</button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>

                </div>
            </template>

            <!-- FULL MENU VIEW -->
            <template x-if="view === 'full-menu'">
                <div class="view-enter p-4 menu-view">

                    <!-- Loading Skeleton -->
                    <template x-if="isLoading">
                        <div>
                            <div class="skeleton-category-header">
                                <div class="skeleton skeleton-cat-title"></div>
                                <div class="skeleton skeleton-cat-icon"></div>
                            </div>
                            <div class="row g-3">
                                <div class="col-12"><div class="skeleton" style="height:100px;border-radius:16px;margin-bottom:12px;"></div></div>
                                <div class="col-12"><div class="skeleton" style="height:100px;border-radius:16px;margin-bottom:12px;"></div></div>
                                <div class="col-12"><div class="skeleton" style="height:100px;border-radius:16px;margin-bottom:12px;"></div></div>
                                <div class="col-12"><div class="skeleton" style="height:100px;border-radius:16px;margin-bottom:12px;"></div></div>
                            </div>
                        </div>
                    </template>

                    <!-- Menu Load Error -->
                    <template x-if="!isLoading && menuError">
                        <div class="text-center p-5">
                            <span class="material-icons text-danger" style="font-size:3rem;">error_outline</span>
                            <p class="mt-3 text-white fw-bold">Could not load menu.</p>
                            <button class="btn btn-outline-danger mt-2" @click="retryMenuLoad()">Retry</button>
                        </div>
                    </template>

                    <!-- Actual Menu Content -->
                    <template x-if="!isLoading && !menuError">
                        <div>
                            <div class="menu-category-hero">
                                <div>
                                    <span class="menu-kicker">Menu Category</span>
                                    <h2 class="fw-bolder text-danger m-0 text-uppercase" x-text="activeCategory"></h2>
                                    <p class="menu-category-copy" x-text="categorySummary(activeCategory)"></p>
                                </div>
                                <button class="menu-hero-action" @click="isDrawerOpen = true" type="button">
                                    <span class="material-icons">menu_open</span>
                                    <span>All sections</span>
                                </button>
                            </div>
                            <div class="row g-3">
                                <template x-for="item in fullMenu[activeCategory]" :key="item.name">
                                    <div class="col-12">
                                        <div class="menu-item-card tuckinn-card p-4" :class="{'item-added': item.justAdded}">
                                            <div class="menu-item-top">
                                                <h5 class="fw-bold text-white m-0 pe-3 lh-sm" x-text="item.name"></h5>
                                                <span class="price-badge text-danger fw-bolder" x-text="formatMoney(item.price)"></span>
                                            </div>
                                            <p class="menu-item-copy" x-text="item.desc"></p>
                                            <button class="btn btn-add-cart w-100 fw-bold py-2 text-uppercase"
                                                    :class="item.justAdded ? 'btn-success' : 'btn-outline-danger'"
                                                    @click="addToCart({name: item.name, price: item.price, desc: item.desc}); item.justAdded = true; setTimeout(() => item.justAdded = false, 800)">
                                                <span class="material-icons me-1" style="font-size:1rem; vertical-align: middle;" x-text="item.justAdded ? 'check' : 'add'"></span>
                                                <span x-text="item.justAdded ? 'Added!' : 'Add to Order'"></span>
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                </div>
            </template>

            <!-- TIER SELECT (Sandwich) -->
            <template x-if="view === 'tier-select'">
                <div class="p-4 view-enter">
                    <div class="text-center mb-4">
                        <div class="tier-header-icon">
                            <span class="material-icons text-danger">lunch_dining</span>
                        </div>
                        <h2 class="fw-bolder text-white mt-3">Build Your Sandwich</h2>
                        <p class="text-white-50">Choose your tier to get started</p>
                    </div>

                    <div class="row g-4">
                        <div class="col-12">
                            <div class="tier-card tier-premium" :class="{'selected': selectedTier === 'premium'}" @click="selectedTier = 'premium'">
                                <div class="tier-badge-popular" x-show="selectedTier !== 'deluxe'">Most Popular</div>
                                <div class="tier-content">
                                    <div class="tier-icon">
                                        <span class="material-icons">star</span>
                                    </div>
                                    <div class="tier-info">
                                        <h3 class="tier-name">Premium</h3>
                                        <div class="tier-price" x-text="formatMoney(6.45)"></div>
                                    </div>
                                </div>
                                <div class="tier-features-list">
                                    <div class="tier-feature"><span class="material-icons">check</span> 1x Protein</div>
                                    <div class="tier-feature"><span class="material-icons">check</span> 1x Cheese</div>
                                    <div class="tier-feature"><span class="material-icons">check</span> 2x Fresh Veg</div>
                                    <div class="tier-feature"><span class="material-icons">check</span> 1x Sauce</div>
                                </div>
                                <div class="tier-select-indicator">
                                    <span class="material-icons" x-show="selectedTier === 'premium'">check_circle</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="tier-card tier-deluxe" :class="{'selected': selectedTier === 'deluxe'}" @click="selectedTier = 'deluxe'">
                                <div class="tier-badge-deluxe">Best Value</div>
                                <div class="tier-content">
                                    <div class="tier-icon">
                                        <span class="material-icons">workspace_premium</span>
                                    </div>
                                    <div class="tier-info">
                                        <h3 class="tier-name">Deluxe</h3>
                                        <div class="tier-price" x-text="formatMoney(8.95)"></div>
                                    </div>
                                </div>
                                <div class="tier-features-list">
                                    <div class="tier-feature"><span class="material-icons">check</span> 2x Protein</div>
                                    <div class="tier-feature"><span class="material-icons">check</span> 2x Cheese</div>
                                    <div class="tier-feature"><span class="material-icons">check</span> 3x Fresh Veg</div>
                                    <div class="tier-feature"><span class="material-icons">check</span> 1x Sauce</div>
                                </div>
                                <div class="tier-select-indicator">
                                    <span class="material-icons" x-show="selectedTier === 'deluxe'">check_circle</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-builder-start w-100 mt-4 py-3 fw-bold" @click="selectTier(selectedTier)" :disabled="!selectedTier">
                        <span>Start Building</span>
                        <span class="material-icons">arrow_forward</span>
                    </button>

                    <div class="text-center mt-4">
                        <button class="btn btn-link text-white-50 fw-bold text-decoration-none text-uppercase" @click="view = 'home'">Cancel</button>
                    </div>
                </div>
            </template>

            <!-- BUILDER VIEW -->
            <template x-if="view === 'build'">
                <div class="p-4 view-enter builder-view">
                    <!-- Builder Header -->
                    <div class="builder-header">
                        <div class="builder-back" @click="prevStep()">
                            <span class="material-icons">arrow_back</span>
                        </div>
                        <div class="builder-progress">
                            <div class="progress-track">
                                <div class="progress-fill" :style="{width: ((builderStep - 1) / totalSteps * 100) + '%'}"></div>
                            </div>
                            <div class="progress-steps">
                                <template x-for="(step, idx) in sandwichSteps" :key="step.id">
                                    <div class="progress-step" :class="{'active': builderStep === idx + 1, 'done': builderStep > idx + 1}">
                                        <div class="step-dot">
                                            <span class="material-icons" x-show="builderStep > idx + 1" style="font-size:12px;">check</span>
                                            <span x-show="builderStep <= idx + 1" x-text="idx + 1"></span>
                                        </div>
                                        <span class="step-label" x-text="step.id"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <div class="builder-price">
                            <span class="material-icons">shopping_basket</span>
                            <span x-text="cart.reduce((s,i) => s + (i.quantity||1), 0)"></span>
                        </div>
                    </div>

                    <!-- Sandwich Preview -->
                    <div class="sandwich-preview-wrapper" x-show="builderType === 'sandwich' && Object.keys(currentBuild.selections || {}).length > 0">
                        <div class="sandwich-visual" id="sandwichVisual">
                            <!-- Layers injected by JS -->
                        </div>
                        <div class="sandwich-layers-list" id="sandwichTags">
                            <!-- Tags injected by JS -->
                        </div>
                    </div>

                    <!-- Live Summary (text only for other builders) -->
                    <div class="builder-summary" x-show="builderType !== 'sandwich' || Object.keys(currentBuild.selections || {}).length === 0">
                        <div class="summary-title">Your Selection</div>
                        <template x-for="(sel, key) in currentBuild.selections" :key="key">
                            <div class="summary-item" x-show="sel && (Array.isArray(sel) ? sel.length : true)">
                                <span class="summary-key" x-text="key + ':'"></span>
                                <span class="summary-val" x-text="Array.isArray(sel) ? sel.join(', ') : sel"></span>
                            </div>
                        </template>
                    </div>

                    <!-- Step Content -->
                    <div class="builder-step-content">
                        <div class="step-header">
                            <div class="step-icon">
                                <span class="material-icons" x-text="getStepIcon(currentStep?.id)"></span>
                            </div>
                            <h2 class="step-title" x-text="currentStep ? currentStep.id : ''"></h2>
                            <p class="step-hint" x-text="currentStep?.multi ? (sandwichTiers[currentBuild.tier]?.limits[currentStep.id] + ' selections allowed') : 'Select one'"></p>
                        </div>

                        <div class="options-grid">
                            <template x-if="currentStep">
                                <template x-for="option in currentStep.options" :key="option">
                                    <div class="option-card"
                                         :class="{'selected': isSelected(currentStep.id, option), 'disabled': isOptionDisabled(currentStep.id, option)}"
                                         @click="selectOption(currentStep.id, option, currentStep.multi)">
                                        <span class="option-name" x-text="option"></span>
                                        <span class="option-check material-icons" x-show="isSelected(currentStep.id, option)">check_circle</span>
                                    </div>
                                </template>
                            </template>
                        </div>
                    </div>

                    <!-- Bottom Action -->
                    <div class="builder-footer">
                        <button class="btn btn-builder-next w-100 py-3 fw-bold" @click="nextStep()" :disabled="!isCurrentStepComplete()" x-text="builderStep === totalSteps ? 'Add to Basket' : 'Next Step'"></button>
                    </div>
                </div>
            </template>

            <!-- CART VIEW -->
            <template x-if="view === 'cart'">
                <div class="p-4 view-enter cart-view">
                    <div class="cart-header">
                        <div>
                            <span class="cart-kicker">Basket</span>
                            <h2 class="fw-bolder text-white mb-0 text-uppercase">Your Order</h2>
                        </div>
                        <div class="cart-header-pill" x-text="(cart.reduce((sum, item) => sum + (item.quantity || 1), 0)) + ' items'"></div>
                    </div>

                    <template x-if="cart.length === 0">
                        <div class="empty-order-shell text-center py-5 my-5">
                            <div class="empty-icon">
                                <span class="material-icons">shopping_basket</span>
                            </div>
                            <h4 class="text-white fw-bold mt-4">Your basket is empty</h4>
                            <p class="text-white-50">Add some delicious items from our menu</p>
                            <button class="btn btn-hero mt-3 px-4 py-2 fw-bold" @click="isDrawerOpen = true">
                                <span class="material-icons me-2" style="font-size:1rem; vertical-align: middle;">restaurant_menu</span>
                                Browse Menu
                            </button>
                        </div>
                    </template>

                    <template x-if="cart.length > 0">
                        <div class="cart-shell">
                            <div class="cart-summary-strip">
                                <div class="cart-summary-meta">
                                    <strong x-text="formatMoney(cartTotal)"></strong>
                                    <span x-text="orderType === 'instore' ? 'Dine-in order' : 'Collection order'"></span>
                                </div>
                                <button class="cart-summary-link" @click="isDrawerOpen = true" type="button">Add more</button>
                            </div>

                            <div class="checkout-section-heading">
                                <span class="section-kicker">Selected items</span>
                                <h5 class="text-white fw-bold m-0">Review Basket</h5>
                            </div>
                            <template x-for="(item, index) in cart" :key="index">
                                <div class="cart-order-card cart-item">
                                    <button class="cart-remove-btn" @click="removeFromCart(index)" type="button" aria-label="Remove item">
                                        <span class="material-icons">close</span>
                                    </button>
                                    <div class="cart-item-head">
                                        <div>
                                            <h6 class="fw-bold text-white m-0 fs-5 lh-sm pe-2" x-text="item.name"></h6>
                                            <p class="cart-item-copy" x-text="formatSelections(item)"></p>
                                        </div>
                                        <span class="cart-item-total" x-text="formatMoney(parseFloat(item.price) * (item.quantity || 1))"></span>
                                    </div>
                                    <div class="qty-control mt-3">
                                        <button class="qty-btn" @click="qtyDecrease(index)" :disabled="item.quantity === 1">
                                            <span class="material-icons" style="font-size:1rem;">remove</span>
                                        </button>
                                        <span class="qty-value" x-text="item.quantity || 1"></span>
                                        <button class="qty-btn" @click="qtyIncrease(index)">
                                            <span class="material-icons" style="font-size:1rem;">add</span>
                                        </button>
                                    </div>
                                </div>
                            </template>

                            <!-- Order Type Toggle -->
                            <div class="order-type-toggle mb-4" x-show="cart.length > 0 && !isTableLocked">
                                <div class="checkout-section-heading compact">
                                    <span class="section-kicker">Service mode</span>
                                    <h5 class="text-white fw-bold m-0">Order Type</h5>
                                </div>
                                <div class="toggle-container">
                                    <div class="toggle-track" :class="{'instore': orderType === 'instore'}">
                                        <div class="toggle-thumb"></div>
                                        <button class="toggle-option" :class="{'active': orderType === 'collect'}" @click="orderType = 'collect'" type="button">
                                            <span class="material-icons" style="font-size:1.2rem;">local_shipping</span>
                                            <span>Collect</span>
                                        </button>
                                        <button class="toggle-option" :class="{'active': orderType === 'instore'}" @click="orderType = 'instore'" type="button">
                                            <span class="material-icons" style="font-size:1.2rem;">restaurant</span>
                                            <span>Dine In</span>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- Customer Details -->
                            <div class="checkout-card mb-3">
                                <div class="checkout-section-heading compact">
                                    <span class="section-kicker">Customer details</span>
                                    <h5 class="text-white fw-bold m-0">Who is this order for?</h5>
                                </div>
                                <div class="form-group">
                                    <label class="checkout-label">Name</label>
                                    <input type="text" x-model="checkoutForm.name" class="form-control" placeholder="Your Name" required>
                                </div>
                                <div class="form-group" x-show="orderType === 'collect'">
                                    <label class="checkout-label">Phone number</label>
                                    <input type="tel" x-model="checkoutForm.phone" class="form-control" placeholder="Phone Number">
                                </div>
                            </div>

                            <!-- Special Instructions -->
                            <div class="checkout-card mb-3">
                                <div class="checkout-section-heading compact">
                                    <span class="section-kicker">Optional notes</span>
                                    <h5 class="text-white fw-bold m-0">Special Instructions</h5>
                                </div>
                                <div class="form-group mb-0">
                                    <textarea x-model="specialInstructions" class="form-control" rows="3" placeholder="Allergies, special requests, or collection notes..."></textarea>
                                </div>
                            </div>

                            <!-- Order Summary -->
                            <div class="checkout-total-bar">
                                <div>
                                    <span class="checkout-total-label">Total</span>
                                    <strong class="checkout-total-value" x-text="formatMoney(cartTotal)"></strong>
                                </div>
                                <button class="btn btn-success checkout-submit-btn py-3 fw-bolder text-uppercase" @click="processOrder()">Place Order</button>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- SUCCESS VIEW -->
            <template x-if="view === 'success'">
                <div class="p-4 view-enter text-center">
                    <div class="success-animation">
                        <div class="success-checkmark">
                            <span class="material-icons text-success">check_circle</span>
                        </div>
                        <div class="success-confetti">
                            <span></span><span></span><span></span><span></span><span></span>
                        </div>
                    </div>
                    <h2 class="text-white fw-bolder mb-1 success-title" x-text="'Thanks, ' + (orderSuccess?.customer_name || 'friend') + '!'"></h2>
                    <p class="text-white-50 mb-2">Your order number is</p>
                    <div class="order-number-badge">
                        <span class="text-danger fw-bolder fs-2" x-text="orderSuccess?.order_number"></span>
                    </div>
                    <div class="success-info mt-4 p-3 rounded">
                        <div class="success-type">
                            <span class="material-icons text-warning fs-2" x-text="orderSuccess?.order_type === 'instore' ? 'restaurant' : 'local_shipping'"></span>
                            <p class="text-warning fw-bold mb-0 mt-2" x-text="orderSuccess?.order_type === 'instore' ? 'DINE IN' : 'COLLECTION'"></p>
                        </div>
                        <div x-show="orderSuccess?.table_number" class="table-badge mt-2">
                            <span class="material-icons text-info" style="font-size:1rem;">table_restaurant</span>
                            <span class="text-info fw-bold" x-text="' Table ' + orderSuccess?.table_number"></span>
                        </div>
                        <p class="text-white-50 small mb-0 mt-2" x-text="orderSuccess?.order_type === 'instore' ? 'We\'ll call your name when ready!' : 'We\'ll text when ready for pickup!'"></p>
                    </div>
                    <div class="success-order-items mt-4">
                        <template x-for="item in orderSuccess?.items" :key="item.name">
                            <div class="success-item">
                                <span class="text-white" x-text="item.name"></span>
                                <span class="text-danger" x-text="formatMoney((item.price || 0) * (item.quantity || 1))"></span>
                            </div>
                        </template>
                        <div class="success-total">
                            <span class="text-white fw-bold">Total</span>
                            <span class="text-danger fw-bold" x-text="formatMoney(orderSuccess?.total)"></span>
                        </div>
                    </div>
                    <button class="btn btn-hero mt-4 px-5 py-3 fw-bold" @click="view = 'home'">Back to Menu</button>
                </div>
            </template>
            
            <!-- ACCOUNT VIEW -->
            <template x-if="view === 'account'">
                <div class="p-4 view-enter mt-4">
                    <div class="account-shell">
                        <img src="logo.jpg" alt="Tuckinn Proper" class="account-logo">
                        <span class="account-kicker">Customer account</span>
                        <h2 class="text-white fw-bolder text-uppercase">Profile Tools Are Coming Next</h2>
                        <p class="text-white-50 fs-5">Ordering is live now. This area will house repeat orders, saved details, and loyalty without changing the core experience.</p>
                        <div class="account-points">
                            <div class="account-point">
                                <span class="material-icons">favorite</span>
                                <div>
                                    <strong>Saved favourites</strong>
                                    <span>Reorder signature builds in seconds</span>
                                </div>
                            </div>
                            <div class="account-point">
                                <span class="material-icons">verified_user</span>
                                <div>
                                    <strong>Trusted checkout</strong>
                                    <span>Faster collection and profile details</span>
                                </div>
                            </div>
                            <div class="account-point">
                                <span class="material-icons">workspace_premium</span>
                                <div>
                                    <strong>Loyalty ready</strong>
                                    <span>Enterprise-ready space for points and offers</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            
        </main>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <div class="nav-item" :class="{'active text-danger': view === 'home'}" @click="view = 'home'"><i class="material-icons fs-2">home</i><span class="nav-label">Home</span></div>
            <div class="nav-item" :class="{'active text-danger': view === 'full-menu' || isDrawerOpen}" @click="isDrawerOpen = true"><i class="material-icons fs-2">restaurant_menu</i><span class="nav-label">Menu</span></div>
            <div class="nav-item position-relative" :class="{'active text-danger': view === 'cart'}" @click="view = 'cart'">
                <i class="material-icons fs-2">shopping_bag</i>
                <span class="nav-label">Basket</span>
                <span x-show="cart.length > 0" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-dark" x-text="cart.length" style="font-size: 12px; margin-top: 5px; margin-left: -10px;"></span>
            </div>
        </nav>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" x-show="toasts.length > 0" x-transition>
        <template x-for="toast in toasts" :key="toast.id">
            <div class="toast-item" :class="'toast-' + toast.type">
                <span class="material-icons" x-text="toast.type === 'success' ? 'check_circle' : toast.type === 'error' ? 'error' : 'info'"></span>
                <span x-text="toast.message"></span>
            </div>
        </template>
    </div>
</body>
</html>
