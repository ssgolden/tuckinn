<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuckinn Staff | Order Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="staff.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <audio id="alertSound" preload="auto"><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav"></audio>
</head>
<body x-data="staffBoard" x-cloak>

    <template x-if="!authenticated">
        <div class="pin-screen">
            <div class="pin-shell">
                <div class="pin-brand-panel">
                    <img src="logo.jpg" alt="Tuckinn Proper" class="pin-brand-logo">
                    <span class="pin-badge">Operations Console</span>
                    <div class="pin-logo">TUCKINN STAFF</div>
                    <p class="pin-subtitle">Secure access for kitchen, collection, and dine-in order management.</p>
                    <div class="pin-highlights">
                        <div class="pin-highlight">
                            <span class="material-icons">bolt</span>
                            <span>Live order flow</span>
                        </div>
                        <div class="pin-highlight">
                            <span class="material-icons">query_stats</span>
                            <span>Service visibility</span>
                        </div>
                        <div class="pin-highlight">
                            <span class="material-icons">shield</span>
                            <span>Protected staff access</span>
                        </div>
                    </div>
                </div>
                <div class="pin-box">
                    <div class="pin-box-kicker">Enter staff PIN</div>
                <div class="pin-display">
                    <span class="pin-dot" :class="{ 'filled': pin.length >= 1 }"></span>
                    <span class="pin-dot" :class="{ 'filled': pin.length >= 2 }"></span>
                    <span class="pin-dot" :class="{ 'filled': pin.length >= 3 }"></span>
                    <span class="pin-dot" :class="{ 'filled': pin.length >= 4 }"></span>
                </div>
                <p class="pin-error" x-show="pinError" x-text="pinError"></p>
                <div class="pin-pad">
                    <template x-for="n in [1,2,3,4,5,6,7,8,9,'CLR',0,'DEL']" :key="'pin-' + n">
                        <button class="pin-btn" :class="{ 'pin-btn-clear': n === 'CLR', 'pin-btn-back': n === 'DEL' }"
                            @click="n === 'CLR' ? pin = '' : n === 'DEL' ? pin = pin.slice(0,-1) : pin.length < 4 ? pin += String(n) : null; if(pin.length === 4) setTimeout(() => login(), 100)"
                            x-text="n">
                        </button>
                    </template>
                </div>
                </div>
            </div>
        </div>
    </template>

    <template x-if="authenticated">
        <div class="staff-dashboard">
            <header class="staff-header">
                <div class="d-flex justify-content-between align-items-center w-100 px-4">
                    <div class="d-flex align-items-center gap-3">
                        <img src="logo.jpg" alt="Tuckinn Proper" class="staff-brand-logo">
                        <div class="staff-brand-copy">
                            <span class="staff-logo">TUCKINN</span>
                            <span class="staff-label">STAFF BOARD</span>
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <div class="order-count-badge" :class="{ 'pulse': activeOrders.length > 0 }">
                            <span class="material-icons">receipt_long</span>
                            <span x-text="activeOrders.length + ' active'"></span>
                        </div>
                        <button class="btn btn-outline-light btn-sm" @click="logout()">
                            <span class="material-icons" style="font-size:16px;">logout</span>
                        </button>
                    </div>
                </div>
            </header>

            <div class="connection-bar" :class="connected ? 'connected' : 'disconnected'">
                <span class="material-icons" style="font-size:14px;" x-text="connected ? 'wifi' : 'wifi_off'"></span>
                <span x-text="connected ? 'Live connected' : 'Reconnecting...'"></span>
                <span x-show="!connected" class="reconnect-spinner"></span>
            </div>

            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-value" x-text="todayStats.orders"></span>
                    <span class="stat-label">Orders Today</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" x-text="formatMoney(todayStats.revenue)"></span>
                    <span class="stat-label">Revenue Today</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" x-text="readyCount"></span>
                    <span class="stat-label">Ready Now</span>
                </div>
            </div>

            <div class="tab-nav">
                <button class="tab-btn" :class="{ 'active': activeTab === 'active' }" @click="activeTab = 'active'">
                    Active <span class="tab-count" x-show="activeOrders.length" x-text="activeOrders.length"></span>
                </button>
                <button class="tab-btn" :class="{ 'active': activeTab === 'history' }" @click="activeTab = 'history'; loadHistory()">
                    History
                </button>
            </div>

            <main class="staff-main">
                <template x-if="activeTab === 'active'">
                    <div>
                        <template x-if="activeOrders.length === 0">
                            <div class="empty-board">
                                <span class="material-icons" style="font-size:80px;color:rgba(255,255,255,0.1);">restaurant</span>
                                <h3 class="text-white-50 mt-3">No active orders</h3>
                                <p class="text-white-50">New orders will appear here automatically</p>
                            </div>
                        </template>

                        <div class="orders-grid">
                            <template x-for="order in activeOrders" :key="'active-' + order.id">
                                <div class="order-card" :class="'status-' + order.status">
                                    <div class="urgency-bar" x-show="order.status === 'new' && minsAgo(order.date) > 5"></div>

                                    <div class="order-card-header">
                                        <div class="order-number" x-text="'#' + order.order_number"></div>
                                        <div class="order-status-badge" :class="'badge-' + order.status" x-text="order.status.toUpperCase()"></div>
                                    </div>
                                    <div x-show="order.table_number" class="table-number-badge">
                                        <span class="material-icons" style="font-size:14px;">table_restaurant</span>
                                        <span x-text="'Table ' + order.table_number"></span>
                                    </div>

                                    <div class="order-items">
                                        <template x-for="(item, idx) in order.items" :key="'item-' + idx">
                                            <div class="order-item">
                                                <span class="item-qty" x-text="(item.quantity || 1) + 'x'"></span>
                                                <span class="item-name" x-text="item.name"></span>
                                            </div>
                                        </template>
                                    </div>

                                    <div class="order-customer">
                                        <span class="material-icons" style="font-size:16px;">person</span>
                                        <span x-text="order.customer_name || 'Guest'"></span>
                                        <span x-show="order.phone" style="margin-left:8px;">
                                            <span class="material-icons" style="font-size:14px;">phone</span>
                                            <span x-text="order.phone"></span>
                                        </span>
                                    </div>

                                    <div class="order-type-badge" :class="order.order_type === 'instore' ? 'badge-instore' : 'badge-collect'">
                                        <span x-text="order.order_type === 'instore' ? 'Dine-in' : 'Collect'"></span>
                                        <span x-show="order.order_type === 'instore' && order.table_number" x-text="' - Table ' + order.table_number" style="margin-left:4px;"></span>
                                    </div>

                                    <div x-show="order.special_instructions" class="order-notes">
                                        <span class="material-icons" style="font-size:14px;">notes</span>
                                        <span x-text="order.special_instructions"></span>
                                    </div>

                                    <div class="order-time">
                                        <span class="material-icons" style="font-size:14px;">schedule</span>
                                        <span x-text="timeAgo(order.date)"></span>
                                        <span x-show="minsAgo(order.date) > 3" style="color:#ff6b6b;margin-left:4px;" x-text="'(' + minsAgo(order.date) + 'm)'"></span>
                                    </div>

                                    <div class="order-action">
                                        <template x-if="order.status === 'new'">
                                            <button class="action-btn action-start" @click="updateStatus(order.id, 'preparing')">
                                                <span>START</span>
                                                <span class="material-icons">arrow_forward</span>
                                            </button>
                                        </template>
                                        <template x-if="order.status === 'preparing'">
                                            <button class="action-btn action-ready" @click="updateStatus(order.id, 'ready')">
                                                <span>READY</span>
                                                <span class="material-icons">done</span>
                                            </button>
                                        </template>
                                        <template x-if="order.status === 'ready'">
                                            <button class="action-btn action-served" @click="updateStatus(order.id, 'served')">
                                                <span>SERVED</span>
                                                <span class="material-icons">check_circle</span>
                                            </button>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <template x-if="activeTab === 'history'">
                    <div>
                        <div class="history-date-header">
                            <span x-text="'Today - ' + historyOrders.length + ' orders'"></span>
                        </div>

                        <template x-if="historyOrders.length === 0">
                            <div class="empty-board">
                                <span class="material-icons" style="font-size:60px;color:rgba(255,255,255,0.1);">history</span>
                                <h3 class="text-white-50 mt-3">No completed orders today</h3>
                            </div>
                        </template>

                        <div class="history-list">
                            <template x-for="order in historyOrders" :key="'history-' + order.id">
                                <div class="history-item">
                                    <div class="history-item-left">
                                        <div class="history-item-number" x-text="'#' + order.order_number"></div>
                                        <div class="history-item-meta">
                                            <span x-text="order.customer_name || 'Guest'"></span>
                                            <span x-text="timeAgo(order.date)"></span>
                                        </div>
                                    </div>
                                    <div class="history-item-right">
                                        <span class="history-total" x-text="formatMoney(order.total)"></span>
                                        <span class="history-served-badge">Served</span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </main>
        </div>
    </template>

    <script src="staff.js"></script>
</body>
</html>
