name: tuckinn-platform

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-resource-limits: &default-limits
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M
      reservations:
        cpus: "0.25"
        memory: 128M

services:
  caddy:
    image: caddy:2.10
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      STORE_DOMAIN: ${STORE_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      STAFF_DOMAIN: ${STAFF_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      storefront:
        condition: service_healthy
      admin:
        condition: service_healthy
      staff:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - edge
      - internal
    <<: *default-limits

  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  redis:
    image: redis:7-bookworm
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      PORT: 3200
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - api_uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3200/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  seed:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    profiles: ["tools"]
    env_file:
      - ../../.env.production
    command: ["pnpm", "--filter", "@tuckinn/api", "exec", "tsx", "../../prisma/seed.ts"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    networks:
      - internal

  storefront:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.next
      args:
        APP_NAME: storefront
        NEXT_PUBLIC_API_BASE_URL: https://${API_DOMAIN}/api
        NEXT_PUBLIC_ADMIN_APP_URL: https://${ADMIN_DOMAIN}
        NEXT_PUBLIC_STAFF_APP_URL: https://${STAFF_DOMAIN}
        NEXT_PUBLIC_STOREFRONT_URL: https://${STORE_DOMAIN}
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging
    networks:
      - internal
    <<: *default-limits

  admin:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.next
      args:
        APP_NAME: admin
        NEXT_PUBLIC_API_BASE_URL: https://${API_DOMAIN}/api
        NEXT_PUBLIC_ADMIN_APP_URL: https://${ADMIN_DOMAIN}
        NEXT_PUBLIC_STAFF_APP_URL: https://${STAFF_DOMAIN}
        NEXT_PUBLIC_STOREFRONT_URL: https://${STORE_DOMAIN}
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging
    networks:
      - internal
    <<: *default-limits

  staff:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.next
      args:
        APP_NAME: staff
        NEXT_PUBLIC_API_BASE_URL: https://${API_DOMAIN}/api
        NEXT_PUBLIC_ADMIN_APP_URL: https://${ADMIN_DOMAIN}
        NEXT_PUBLIC_STAFF_APP_URL: https://${STAFF_DOMAIN}
        NEXT_PUBLIC_STOREFRONT_URL: https://${STORE_DOMAIN}
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging
    networks:
      - internal
    <<: *default-limits

volumes:
  api_uploads:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  edge:
  internal: