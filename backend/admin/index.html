<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuckinn Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --primary: #FF3B3B;
            --dark: #0a0a0a;
            --card: #141414;
            --border: #2a2a2a;
        }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: var(--card) !important; border-bottom: 1px solid var(--border); }
        .btn-primary { background: var(--primary); border-color: var(--primary); }
        .btn-primary:hover { background: #e03030; border-color: #e03030; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
        .form-control, .form-select { background: #1a1a1a; border: 1px solid var(--border); color: #fff; }
        .form-control:focus, .form-select:focus { background: #1a1a1a; border-color: var(--primary); color: #fff; }
        .table { color: #fff; }
        .table > :not(caption) > * > * { background: transparent; border-bottom-color: var(--border); }
        .nav-tabs .nav-link { color: #aaa; border: none; }
        .nav-tabs .nav-link.active { color: var(--primary); border-bottom: 2px solid var(--primary); background: transparent; }
        .nav-tabs .nav-link:hover { color: #fff; }
        .item-card { transition: transform 0.2s; }
        .item-card:hover { transform: translateY(-2px); }
        .item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; background: #222; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .toast { background: var(--card); border: 1px solid var(--border); color: #fff; }
        .badge-status { font-size: 0.75rem; padding: 0.35em 0.65em; }
        .modal-content { background: var(--card); border: 1px solid var(--border); color: #fff; }
        .modal-header { border-bottom: 1px solid var(--border); }
        .modal-footer { border-top: 1px solid var(--border); }
        .login-container { max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body>
    <div id="app" x-data="adminApp()" x-init="init()">
        <!-- Toast Notifications -->
        <div class="toast-container">
            <template x-for="toast in toasts" :key="toast.id">
                <div class="toast show" x-transition>
                    <div class="toast-body" x-text="toast.message"></div>
                </div>
            </template>
        </div>

        <!-- Login Screen -->
        <template x-if="!isLoggedIn">
            <div class="login-container">
                <div class="card p-4">
                    <h3 class="text-center mb-4"><span class="material-icons text-danger align-middle">restaurant</span> Tuckinn Admin</h3>
                    <form @submit.prevent="login()">
                        <div class="mb-3">
                            <label class="form-label">Staff PIN</label>
                            <input type="password" class="form-control" x-model="pin" placeholder="Enter PIN" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" :disabled="loading">
                            <span x-show="loading">Signing in...</span>
                            <span x-show="!loading">Sign In</span>
                        </button>
                        <p class="text-danger mt-2 text-center" x-show="error" x-text="error"></p>
                    </form>
                </div>
            </div>
        </template>

        <!-- Admin Panel -->
        <template x-if="isLoggedIn">
            <div>
                <!-- Navbar -->
                <nav class="navbar navbar-expand-lg navbar-dark">
                    <div class="container-fluid">
                        <a class="navbar-brand" href="#">
                            <span class="material-icons text-danger align-middle">restaurant</span> Tuckinn Admin
                        </a>
                        <div class="d-flex">
                            <a href="/" target="_blank" class="btn btn-outline-light btn-sm me-2">
                                <span class="material-icons align-middle" style="font-size:1rem">open_in_new</span>
                                View Site
                            </a>
                            <button class="btn btn-outline-danger btn-sm" @click="logout()">Logout</button>
                        </div>
                    </div>
                </nav>

                <!-- Tabs -->
                <div class="container mt-4">
                    <ul class="nav nav-tabs mb-4">
                        <li class="nav-item">
                            <button class="nav-link" :class="{ active: tab === 'categories' }" @click="tab = 'categories'">
                                <span class="material-icons align-middle me-1" style="font-size:1rem">category</span>
                                Categories
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" :class="{ active: tab === 'items' }" @click="tab = 'items'; loadItems()">
                                <span class="material-icons align-middle me-1" style="font-size:1rem">fastfood</span>
                                Menu Items
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" :class="{ active: tab === 'orders' }" @click="tab = 'orders'; loadOrders()">
                                <span class="material-icons align-middle me-1" style="font-size:1rem">receipt_long</span>
                                Orders
                            </button>
                        </li>
                    </ul>

                    <!-- Categories Tab -->
                    <div x-show="tab === 'categories'">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5>Categories</h5>
                            <button class="btn btn-primary btn-sm" @click="openCategoryModal()">
                                <span class="material-icons align-middle" style="font-size:1rem">add</span>
                                Add Category
                            </button>
                        </div>
                        <div class="card">
                            <div class="card-body">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th>Name</th>
                                            <th>Slug</th>
                                            <th>Items</th>
                                            <th>Sort</th>
                                            <th>Visible</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="cat in categories" :key="cat.slug">
                                            <tr>
                                                <td x-text="cat.name"></td>
                                                <td><code x-text="cat.slug"></code></td>
                                                <td>
                                                    <template x-for="cat2 in categoriesWithItems" :key="cat2.slug">
                                                        <span x-show="cat2.slug === cat.slug" x-text="cat2.item_count + ' items'"></span>
                                                    </template>
                                                </td>
                                                <td x-text="cat.sort_order"></td>
                                                <td>
                                                    <span class="badge" :class="cat.is_visible ? 'bg-success' : 'bg-secondary'" x-text="cat.is_visible ? 'Yes' : 'No'"></span>
                                                </td>
                                                <td>
                                                    <button class="btn btn-sm btn-outline-primary me-1" @click="openCategoryModal(cat)">
                                                        <span class="material-icons" style="font-size:1rem">edit</span>
                                                    </button>
                                                    <button class="btn btn-sm btn-outline-danger" @click="deleteCategory(cat.slug)">
                                                        <span class="material-icons" style="font-size:1rem">delete</span>
                                                    </button>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Menu Items Tab -->
                    <div x-show="tab === 'items'">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5>Menu Items</h5>
                            <button class="btn btn-primary btn-sm" @click="openItemModal()">
                                <span class="material-icons align-middle" style="font-size:1rem">add</span>
                                Add Item
                            </button>
                        </div>
                        <div class="row">
                            <template x-for="item in items" :key="item.id">
                                <div class="col-md-6 col-lg-4 mb-3">
                                    <div class="card item-card h-100">
                                        <div class="card-body">
                                            <div class="d-flex">
                                                <template x-if="item.image_url">
                                                    <img :src="item.image_url" class="item-img me-3" alt="">
                                                </template>
                                                <template x-if="!item.image_url">
                                                    <div class="item-img me-3 d-flex align-items-center justify-content-center bg-secondary">
                                                        <span class="material-icons text-white">image</span>
                                                    </div>
                                                </template>
                                                <div class="flex-grow-1">
                                                    <h6 class="mb-1" x-text="item.name"></h6>
                                                    <p class="text-muted small mb-1" x-text="item.description?.substring(0, 60) + '...'"></p>
                                                    <div class="d-flex justify-content-between align-items-center">
                                                        <strong class="text-danger" x-text="'€' + parseFloat(item.price).toFixed(2)"></strong>
                                                        <span class="badge bg-secondary" x-text="item.category_name"></span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="mt-3 d-flex gap-1">
                                                <button class="btn btn-sm btn-outline-primary flex-grow-1" @click="openItemModal(item)">Edit</button>
                                                <button class="btn btn-sm btn-outline-danger" @click="deleteItem(item.id)">
                                                    <span class="material-icons" style="font-size:1rem">delete</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <div x-show="items.length === 0" class="text-center text-muted py-5">
                            <span class="material-icons" style="font-size:3rem">fastfood</span>
                            <p class="mt-2">No menu items yet. Add your first item!</p>
                        </div>
                    </div>

                    <!-- Orders Tab -->
                    <div x-show="tab === 'orders'">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5>Orders</h5>
                            <div class="d-flex gap-2">
                                <select class="form-select form-select-sm" style="width:auto" x-model="orderFilter" @change="loadOrders()">
                                    <option value="">All</option>
                                    <option value="active">Active</option>
                                    <option value="new">New</option>
                                    <option value="preparing">Preparing</option>
                                    <option value="ready">Ready</option>
                                    <option value="served">Served</option>
                                </select>
                                <button class="btn btn-sm btn-outline-light" @click="loadOrders()">
                                    <span class="material-icons" style="font-size:1rem">refresh</span>
                                </button>
                            </div>
                        </div>
                        <div class="row">
                            <template x-for="order in orders" :key="order.id">
                                <div class="col-md-6 mb-3">
                                    <div class="card">
                                        <div class="card-header d-flex justify-content-between align-items-center">
                                            <div>
                                                <strong x-text="order.order_number"></strong>
                                                <span class="badge ms-2" :class="getStatusClass(order.status)" x-text="order.status"></span>
                                            </div>
                                            <small class="text-muted" x-text="formatDate(order.created_at)"></small>
                                        </div>
                                        <div class="card-body">
                                            <p class="mb-1"><strong x-text="order.customer_name"></strong> <span class="text-muted" x-text="order.order_type"></span></p>
                                            <template x-if="order.table_number">
                                                <p class="mb-1 small">Table: <strong x-text="order.table_number"></strong></p>
                                            </template>
                                            <hr>
                                            <template x-for="item in order.items" :key="item.name">
                                                <div class="d-flex justify-content-between small">
                                                    <span x-text="item.quantity + 'x ' + item.name"></span>
                                                    <span>€<span x-text="(item.price * item.quantity).toFixed(2)"></span></span>
                                                </div>
                                            </template>
                                            <hr>
                                            <div class="d-flex justify-content-between">
                                                <strong>Total</strong>
                                                <strong class="text-danger">€<span x-text="parseFloat(order.total).toFixed(2)"></span></strong>
                                            </div>
                                            <template x-if="order.special_instructions">
                                                <p class="text-muted small mt-2 mb-0"><em>Note: <span x-text="order.special_instructions"></span></em></p>
                                            </template>
                                        </div>
                                        <div class="card-footer">
                                            <div class="d-flex gap-1">
                                                <button class="btn btn-sm btn-outline-warning" @click="updateOrderStatus(order.id, 'preparing')" :disabled="order.status === 'preparing' || order.status === 'ready' || order.status === 'served'">Preparing</button>
                                                <button class="btn btn-sm btn-outline-success" @click="updateOrderStatus(order.id, 'ready')" :disabled="order.status === 'ready' || order.status === 'served'">Ready</button>
                                                <button class="btn btn-sm btn-outline-primary" @click="updateOrderStatus(order.id, 'served')" :disabled="order.status === 'served'">Served</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <div x-show="orders.length === 0" class="text-center text-muted py-5">
                            <span class="material-icons" style="font-size:3rem">receipt_long</span>
                            <p class="mt-2">No orders found.</p>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Category Modal -->
        <div class="modal fade" id="categoryModal" tabindex="-1" :class="{ show: showCategoryModal }" :style="{ display: showCategoryModal ? 'block' : 'none' }">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" x-text="editingCategory ? 'Edit Category' : 'Add Category'"></h5>
                        <button type="button" class="btn-close btn-close-white" @click="showCategoryModal = false"></button>
                    </div>
                    <form @submit.prevent="saveCategory()">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control" x-model="categoryForm.name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" x-model="categoryForm.description" rows="2"></textarea>
                            </div>
                            <div class="row">
                                <div class="col-6">
                                    <label class="form-label">Sort Order</label>
                                    <input type="number" class="form-control" x-model="categoryForm.sort_order">
                                </div>
                                <div class="col-6">
                                    <label class="form-label">Visible</label>
                                    <select class="form-select" x-model="categoryForm.is_visible">
                                        <option :value="1">Yes</option>
                                        <option :value="0">No</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" @click="showCategoryModal = false">Cancel</button>
                            <button type="submit" class="btn btn-primary" :disabled="saving">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Item Modal -->
        <div class="modal fade" id="itemModal" tabindex="-1" :class="{ show: showItemModal }" :style="{ display: showItemModal ? 'block' : 'none' }">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" x-text="editingItem ? 'Edit Item' : 'Add Item'"></h5>
                        <button type="button" class="btn-close btn-close-white" @click="showItemModal = false"></button>
                    </div>
                    <form @submit.prevent="saveItem()">
                        <div class="modal-body">
                            <div class="row">
                                <div class="col-md-8">
                                    <div class="mb-3">
                                        <label class="form-label">Name</label>
                                        <input type="text" class="form-control" x-model="itemForm.name" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Category</label>
                                        <select class="form-select" x-model="itemForm.category_slug" required>
                                            <template x-for="cat in categories" :key="cat.slug">
                                                <option :value="cat.slug" x-text="cat.name"></option>
                                            </template>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Description</label>
                                        <textarea class="form-control" x-model="itemForm.description" rows="2"></textarea>
                                    </div>
                                    <div class="row">
                                        <div class="col-6">
                                            <label class="form-label">Price (€)</label>
                                            <input type="number" step="0.01" min="0" class="form-control" x-model="itemForm.price" required>
                                        </div>
                                        <div class="col-6">
                                            <label class="form-label">Sort Order</label>
                                            <input type="number" class="form-control" x-model="itemForm.sort_order">
                                        </div>
                                    </div>
                                    <div class="mb-3 mt-3">
                                        <label class="form-label">Visible</label>
                                        <select class="form-select" x-model="itemForm.is_visible">
                                            <option :value="1">Yes</option>
                                            <option :value="0">No</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Image</label>
                                    <div class="border rounded p-3 text-center">
                                        <template x-if="itemForm.image_url">
                                            <img :src="itemForm.image_url" class="img-fluid rounded mb-2" style="max-height:150px;object-fit:cover;">
                                        </template>
                                        <template x-if="!itemForm.image_url">
                                            <div class="bg-secondary rounded mb-2 d-flex align-items-center justify-content-center" style="height:100px;">
                                                <span class="material-icons text-white">image</span>
                                            </div>
                                        </template>
                                        <input type="file" class="form-control mb-2" accept="image/*" @change="uploadImage($event)">
                                        <template x-if="uploading">
                                            <div class="text-muted small">Uploading...</div>
                                        </template>
                                        <template x-if="itemForm.image_path && !uploading">
                                            <button type="button" class="btn btn-sm btn-outline-danger" @click="itemForm.image_path = null; itemForm.image_url = null;">Remove</button>
                                        </template>
                                        <p class="text-muted small mb-0">JPG, PNG, WebP, GIF. Max 5MB.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" @click="showItemModal = false">Cancel</button>
                            <button type="submit" class="btn btn-primary" :disabled="saving">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
    function adminApp() {
        return {
            isLoggedIn: false,
            loading: false,
            saving: false,
            uploading: false,
            pin: '',
            error: '',
            tab: 'categories',
            orderFilter: '',
            categories: [],
            categoriesWithItems: [],
            items: [],
            orders: [],
            toasts: [],
            showCategoryModal: false,
            showItemModal: false,
            editingCategory: null,
            editingItem: null,
            categoryForm: { name: '', description: '', sort_order: 0, is_visible: 1 },
            itemForm: { category_slug: '', name: '', description: '', price: '', image_path: null, image_url: null, sort_order: 0, is_visible: 1 },

            async init() {
                await this.checkSession();
                if (this.isLoggedIn) {
                    await this.loadCategories();
                }
            },

            async checkSession() {
                try {
                    const res = await fetch('/api/staff/session');
                    const data = await res.json();
                    this.isLoggedIn = data.authenticated;
                } catch (e) {
                    this.isLoggedIn = false;
                }
            },

            async login() {
                this.loading = true;
                this.error = '';
                try {
                    const res = await fetch('/api/staff/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pin: this.pin })
                    });
                    if (res.ok) {
                        this.isLoggedIn = true;
                        await this.loadCategories();
                    } else {
                        const data = await res.json();
                        this.error = data.error || 'Invalid PIN';
                    }
                } catch (e) {
                    this.error = 'Connection error';
                }
                this.loading = false;
            },

            async logout() {
                await fetch('/api/staff/logout', { method: 'POST' });
                this.isLoggedIn = false;
                this.categories = [];
                this.items = [];
                this.orders = [];
            },

            async loadCategories() {
                try {
                    const res = await fetch('/api/categories');
                    this.categories = await res.json();
                    // Load item counts
                    const itemsRes = await fetch('/api/menu/items');
                    const items = await itemsRes.json();
                    this.categoriesWithItems = this.categories.map(cat => ({
                        ...cat,
                        item_count: items.filter(i => i.category_slug === cat.slug).length
                    }));
                } catch (e) {
                    this.showToast('Failed to load categories', 'error');
                }
            },

            async loadItems() {
                try {
                    const res = await fetch('/api/menu/items');
                    this.items = await res.json();
                } catch (e) {
                    this.showToast('Failed to load items', 'error');
                }
            },

            async loadOrders() {
                try {
                    const url = this.orderFilter ? `/api/orders?status=${this.orderFilter}` : '/api/orders';
                    const res = await fetch(url);
                    this.orders = await res.json();
                } catch (e) {
                    this.showToast('Failed to load orders', 'error');
                }
            },

            openCategoryModal(cat = null) {
                this.editingCategory = cat;
                if (cat) {
                    this.categoryForm = { name: cat.name, description: cat.description || '', sort_order: cat.sort_order, is_visible: cat.is_visible };
                } else {
                    this.categoryForm = { name: '', description: '', sort_order: 0, is_visible: 1 };
                }
                this.showCategoryModal = true;
            },

            async saveCategory() {
                this.saving = true;
                try {
                    if (this.editingCategory) {
                        await fetch(`/api/categories/${this.editingCategory.slug}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.categoryForm)
                        });
                    } else {
                        await fetch('/api/categories', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.categoryForm)
                        });
                    }
                    this.showCategoryModal = false;
                    await this.loadCategories();
                    this.showToast(this.editingCategory ? 'Category updated' : 'Category created');
                } catch (e) {
                    this.showToast('Failed to save category', 'error');
                }
                this.saving = false;
            },

            async deleteCategory(slug) {
                if (!confirm('Delete this category and all its items?')) return;
                try {
                    await fetch(`/api/categories/${slug}`, { method: 'DELETE' });
                    await this.loadCategories();
                    this.showToast('Category deleted');
                } catch (e) {
                    this.showToast('Failed to delete category', 'error');
                }
            },

            openItemModal(item = null) {
                this.editingItem = item;
                if (item) {
                    this.itemForm = {
                        category_slug: item.category_slug,
                        name: item.name,
                        description: item.description || '',
                        price: item.price,
                        image_path: item.image_path,
                        image_url: item.image_url,
                        sort_order: item.sort_order,
                        is_visible: item.is_visible
                    };
                } else {
                    this.itemForm = {
                        category_slug: this.categories[0]?.slug || '',
                        name: '',
                        description: '',
                        price: '',
                        image_path: null,
                        image_url: null,
                        sort_order: 0,
                        is_visible: 1
                    };
                }
                this.showItemModal = true;
            },

            async uploadImage(event) {
                const file = event.target.files[0];
                if (!file) return;
                this.uploading = true;
                try {
                    const formData = new FormData();
                    formData.append('image', file);
                    const res = await fetch('/api/upload', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.success) {
                        this.itemForm.image_path = data.filename;
                        this.itemForm.image_url = data.url;
                        this.showToast('Image uploaded');
                    }
                } catch (e) {
                    this.showToast('Upload failed', 'error');
                }
                this.uploading = false;
            },

            async saveItem() {
                this.saving = true;
                try {
                    if (this.editingItem) {
                        await fetch(`/api/menu/items/${this.editingItem.id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.itemForm)
                        });
                    } else {
                        await fetch('/api/menu/items', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.itemForm)
                        });
                    }
                    this.showItemModal = false;
                    await this.loadItems();
                    await this.loadCategories();
                    this.showToast(this.editingItem ? 'Item updated' : 'Item created');
                } catch (e) {
                    this.showToast('Failed to save item', 'error');
                }
                this.saving = false;
            },

            async deleteItem(id) {
                if (!confirm('Delete this item?')) return;
                try {
                    await fetch(`/api/menu/items/${id}`, { method: 'DELETE' });
                    await this.loadItems();
                    await this.loadCategories();
                    this.showToast('Item deleted');
                } catch (e) {
                    this.showToast('Failed to delete item', 'error');
                }
            },

            async updateOrderStatus(id, status) {
                try {
                    await fetch(`/api/orders/${id}/status`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status })
                    });
                    await this.loadOrders();
                    this.showToast(`Order marked as ${status}`);
                } catch (e) {
                    this.showToast('Failed to update order', 'error');
                }
            },

            getStatusClass(status) {
                const map = { new: 'bg-danger', preparing: 'bg-warning text-dark', ready: 'bg-success', served: 'bg-secondary' };
                return map[status] || 'bg-secondary';
            },

            formatDate(dateStr) {
                if (!dateStr) return '';
                return new Date(dateStr).toLocaleString();
            },

            showToast(message, type = 'success') {
                const id = Date.now();
                this.toasts.push({ id, message, type });
                setTimeout(() => {
                    this.toasts = this.toasts.filter(t => t.id !== id);
                }, 3000);
            }
        };
    }
    </script>
</body>
</html>
